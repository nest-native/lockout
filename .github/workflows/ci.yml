name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package-build:
    name: Package build/typecheck (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      # Build the core first so the adapter + sample resolve its emitted types.
      - name: Build core (@authlock/core)
        run: npm run build --workspace @authlock/core

      - name: Build adapter (@nest-native/lockout)
        run: npm run build --workspace @nest-native/lockout

      - name: Typecheck core
        run: npm run typecheck --workspace @authlock/core

      - name: Typecheck adapter
        run: npm run typecheck --workspace @nest-native/lockout

  package-test-node-20:
    name: Package tests/coverage (Node 20)
    runs-on: ubuntu-latest
    # No external DB services: the core suite is fully hermetic (in-memory
    # store), and the gated Drizzle-store round-trips live in store-integration.
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run core tests with coverage
        run: npm run test:cov

      # The adapter tests import `@authlock/core` by package name, which
      # resolves to packages/core/dist — build it first.
      - name: Build core (@authlock/core)
        run: npm run build --workspace @authlock/core

      - name: Run adapter tests
        run: npm run test:nestjs

  package-quality:
    name: Tests, coverage, and complexity (Node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Restore base branch CI data
        if: github.event_name == 'pull_request'
        id: base-ci-data
        uses: actions/cache/restore@v6
        with:
          path: ci-data
          key: ci-data-node-22-${{ github.base_ref }}-
          restore-keys: ci-data-node-22-${{ github.base_ref }}-

      - name: Extract base CI data
        if: steps.base-ci-data.outputs.cache-matched-key
        run: |
          cp ci-data/coverage-summary.json base-coverage-summary.json 2>/dev/null || true
          cp ci-data/test-results.json base-test-results.json 2>/dev/null || true
          cp ci-data/test-step-duration-ms.txt base-test-step-duration-ms.txt 2>/dev/null || true
          cp ci-data/cognitive-complexity-summary.json base-cognitive-complexity-summary.json 2>/dev/null || true

      - name: Run core tests with coverage
        run: |
          START=$SECONDS
          npm run test:cov
          echo $(( (SECONDS - START) * 1000 )) > test-step-duration-ms.txt

      # The adapter tests import `@authlock/core` by package name, which
      # resolves to packages/core/dist — build it first.
      - name: Build core (@authlock/core)
        run: npm run build --workspace @authlock/core

      - name: Run adapter tests
        run: npm run test:nestjs

      - name: Enforce cognitive complexity threshold
        run: npm run complexity:check

      - name: Generate cognitive complexity report
        run: npm run complexity:report

      - name: Generate base cognitive complexity fallback
        if: github.event_name == 'pull_request'
        run: |
          if [ -f base-cognitive-complexity-summary.json ]; then
            exit 0
          fi

          BASE_DIR="$(mktemp -d)"
          cleanup() {
            git worktree remove --force "$BASE_DIR" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          git worktree add --detach "$BASE_DIR" "${{ github.event.pull_request.base.sha }}"
          ln -s "$GITHUB_WORKSPACE/node_modules" "$BASE_DIR/node_modules"
          (
            cd "$BASE_DIR"
            node scripts/collect-cognitive-complexity.mjs \
              --output "$GITHUB_WORKSPACE/base-cognitive-complexity-summary.json"
          )

      - name: Cache CI data for base branch
        if: github.event_name == 'push'
        run: |
          mkdir -p ci-data
          cp coverage/coverage-summary.json ci-data/coverage-summary.json
          cp test-results.json ci-data/test-results.json
          cp test-step-duration-ms.txt ci-data/test-step-duration-ms.txt
          cp complexity/cognitive-complexity-summary.json ci-data/cognitive-complexity-summary.json

      - if: github.event_name == 'push'
        uses: actions/cache/save@v6
        with:
          path: ci-data
          key: ci-data-node-22-${{ github.ref_name }}-${{ github.sha }}

      - name: Get changed files
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'packages/**/*.ts' | tee changed-files.txt

      - name: Coverage Report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const report = require('./.github/scripts/coverage-report.js');
            await report({ github, context, core });

      - name: Performance Report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const report = require('./.github/scripts/performance-report.js');
            await report({ github, context, core });

      - name: Complexity Report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const report = require('./.github/scripts/complexity-report.js');
            await report({ github, context, core });

      - name: Coverage and performance summary
        run: |
          node -e "
          const fs = require('node:fs');
          const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8')).total;
          const duration = fs.readFileSync('test-step-duration-ms.txt', 'utf8').trim();
          const metrics = {
            statements: summary.statements.pct,
            branches: summary.branches.pct,
            functions: summary.functions.pct,
            lines: summary.lines.pct,
          };
          const report = [
            '### Package Quality',
            '',
            '| Metric | Value |',
            '| :--- | ---: |',
            '| Statements | ' + metrics.statements + '% |',
            '| Branches | ' + metrics.branches + '% |',
            '| Functions | ' + metrics.functions + '% |',
            '| Lines | ' + metrics.lines + '% |',
            '| Test step duration | ' + duration + ' ms |',
          ].join('\n');
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, report + '\n');
          "

      - name: Upload quality artifacts
        uses: actions/upload-artifact@v7
        with:
          name: package-quality
          path: |
            coverage/coverage-summary.json
            coverage/lcov.info
            complexity/cognitive-complexity-summary.json
            test-results.json
            test-step-duration-ms.txt
          if-no-files-found: error

  store-integration:
    name: Store integration (real Postgres + MySQL)
    runs-on: ubuntu-latest
    # The only job with DB services: it runs the gated Drizzle-store round-trips
    # (test/integration), which skip everywhere else because LOCKOUT_POSTGRES_URL
    # and LOCKOUT_MYSQL_URL are unset. The main suite stays hermetic.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lockout
          POSTGRES_USER: lockout
          POSTGRES_PASSWORD: lockout
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U lockout -d lockout"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: lockout
          MYSQL_ROOT_PASSWORD: lockout-ci-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -plockout-ci-password"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run gated store round-trips
        run: npm run test:integration
        env:
          LOCKOUT_POSTGRES_URL: postgres://lockout:lockout@127.0.0.1:5432/lockout
          LOCKOUT_MYSQL_URL: mysql://root:lockout-ci-password@127.0.0.1:3306/lockout

  nestjs-compat:
    name: NestJS ${{ matrix.nest-major }} backward-compat (adapter typecheck)
    runs-on: ubuntu-latest
    # The adapter builds only on stable Nest primitives (CanActivate,
    # DynamicModule, HttpException), so it must typecheck against every
    # supported major. Becomes fully meaningful once LockoutGuard/Module land.
    strategy:
      fail-fast: false
      matrix:
        nest-major: ['10', '11']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Pin NestJS to major ${{ matrix.nest-major }}
        run: npm install --no-save --workspace @nest-native/lockout "@nestjs/common@^${{ matrix.nest-major }}" "@nestjs/core@^${{ matrix.nest-major }}"

      - name: Build core (@authlock/core)
        run: npm run build --workspace @authlock/core

      - name: Typecheck adapter against NestJS ${{ matrix.nest-major }}
        run: npm run typecheck --workspace @nest-native/lockout

  nestjs-canary:
    name: NestJS 12-alpha canary (informational)
    runs-on: ubuntu-latest
    # Gated, informational: tracks the next NestJS major before it is stable.
    # continue-on-error so a breaking pre-release never blocks a merge.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Pin NestJS to the 12 pre-release line
        run: npm install --no-save --workspace @nest-native/lockout "@nestjs/common@12 || @nestjs/common@^12.0.0-0" "@nestjs/core@12 || @nestjs/core@^12.0.0-0"

      - name: Build core (@authlock/core)
        run: npm run build --workspace @authlock/core

      - name: Typecheck adapter against NestJS 12-alpha
        run: npm run typecheck --workspace @nest-native/lockout

  release-and-security:
    name: Release and security checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Validate package tarball
        run: npm run release:check

      - name: Audit production supply chain
        run: npm run security:audit

  samples:
    name: Sample validation
    runs-on: ubuntu-latest
    # The showcase runs the framework-free core (in-memory store); no external
    # DB services needed.
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build core (@authlock/core)
        run: npm run build --workspace @authlock/core

      # The NestJS sample imports `@nest-native/lockout` by package name, which
      # resolves to packages/nestjs/dist — build the adapter too.
      - name: Build adapter (@nest-native/lockout)
        run: npm run build --workspace @nest-native/lockout

      - name: Run sample matrix
        run: |
          START=$SECONDS
          npm run ci:sample
          echo $(( (SECONDS - START) * 1000 )) > sample-validation-duration-ms.txt

      - name: Sample matrix summary
        run: |
          DURATION_MS="$(cat sample-validation-duration-ms.txt)"
          DURATION_SECONDS="$(node -e "console.log((Number(process.argv[1]) / 1000).toFixed(2))" "$DURATION_MS")"
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ### Sample Matrix

          | Metric | Value |
          | :--- | ---: |
          | Sample validation duration | DURATION_PLACEHOLDER |

          | Store | Sample | CI behavior |
          | :--- | :--- | :--- |
          | in-memory | `00-showcase` | Framework-free core smoke |
          EOF
          sed -i "s/DURATION_PLACEHOLDER/${DURATION_SECONDS}s (${DURATION_MS}ms)/" "$GITHUB_STEP_SUMMARY"

  docs-site:
    name: Docusaurus build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install docs website dependencies
        run: npm --prefix website ci

      - name: Build docs site
        run: npm --prefix website run build
