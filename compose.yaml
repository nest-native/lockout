# Optional local infrastructure for the gated Postgres + MySQL store specs.
# Nothing in the default `npm test` path needs this — forks work without Docker,
# and CI provisions its own database services for the dedicated integration job.
# See GUIDELINES_NEST_LOCKOUT.md, "Local full-mode verification".
#
#   npm run infra:up     start + wait for health
#   npm run test:full    run the suite with the gated store specs enabled
#   npm run infra:down   remove containers and volumes
#
# Host ports are deliberately non-default (54329 / 33069) so this stack can run
# alongside other nest-native repos' compose stacks without colliding.
services:
  postgres:
    image: postgres:16
    container_name: nest-lockout-postgres
    environment:
      POSTGRES_DB: lockout
      POSTGRES_USER: lockout
      POSTGRES_PASSWORD: lockout
    ports:
      - '127.0.0.1:54329:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lockout -d lockout']
      interval: 2s
      timeout: 3s
      retries: 60

  mysql:
    image: mysql:8.4
    container_name: nest-lockout-mysql
    environment:
      MYSQL_ROOT_PASSWORD: lockout
      MYSQL_DATABASE: lockout
      MYSQL_USER: lockout
      MYSQL_PASSWORD: lockout
    ports:
      - '127.0.0.1:33069:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-plockout']
      interval: 2s
      timeout: 3s
      retries: 60
